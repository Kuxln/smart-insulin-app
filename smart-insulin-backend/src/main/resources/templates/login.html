<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Smart Insulin — Вхід</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow" style="width: 26rem;">
        <div class="card-body p-4">
            <h4 class="card-title text-center mb-4">Smart Insulin</h4>

            <div th:if="${param.error}" class="alert alert-danger">
                Невірний email або пароль.
            </div>
            <div th:if="${param.logout}" class="alert alert-info">
                Ви вийшли з системи.
            </div>
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label">Email</label>
                    <input type="email" id="username" name="username"
                           class="form-control" required autofocus>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Пароль</label>
                    <input type="password" id="password" name="password"
                           class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Увійти</button>
            </form>

            <hr>
            <p class="text-center mb-0">
                Немає акаунту? <a th:href="@{/register}">Зареєструватись</a>
            </p>
        </div>
    </div>
</div>
</body>
</html>
