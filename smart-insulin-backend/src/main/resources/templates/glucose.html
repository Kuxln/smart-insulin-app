<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Smart Insulin — Глюкоза</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/dashboard}">Smart Insulin</a>
        <div class="navbar-nav ms-auto d-flex align-items-center gap-2">
            <a class="nav-link text-white active" th:href="@{/glucose}">Глюкоза</a>
            <a class="nav-link text-white" th:href="@{/profile}">Профіль</a>
            <form th:action="@{/logout}" method="post" class="mb-0">
                <button type="submit" class="btn btn-outline-light btn-sm">Вийти</button>
            </form>
        </div>
    </div>
</nav>

<div class="container">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" th:text="${success}">
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Add reading form -->
    <div class="card shadow-sm mb-4">
        <div class="card-header">Додати показник глюкози</div>
        <div class="card-body">
            <form th:action="@{/glucose}" th:object="${form}" method="post"
                  class="row g-3 align-items-end">
                <div class="col-md-2">
                    <label class="form-label">Глюкоза (ммоль/л)</label>
                    <input type="number" step="0.1" min="0" max="50"
                           th:field="*{glucoseValue}" class="form-control" required>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Тип</label>
                    <select th:field="*{measurementType}" class="form-select">
                        <option value="MANUAL">Ручне</option>
                        <option value="CGM">CGM</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Дата та час</label>
                    <input type="datetime-local" th:field="*{measuredAt}"
                           class="form-control" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Нотатки</label>
                    <input type="text" th:field="*{notes}" class="form-control"
                           placeholder="необов'язково">
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100">Додати</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Readings table -->
    <div class="card shadow-sm">
        <div class="card-header">Всі показники</div>
        <div class="card-body p-0">
            <div th:if="${readings.empty}" class="p-3 text-muted">Показників ще немає.</div>
            <table th:unless="${readings.empty}" class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th>Дата та час</th>
                    <th>Глюкоза (ммоль/л)</th>
                    <th>Тип</th>
                    <th>Нотатки</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="r : ${readings}">
                    <td th:text="${#temporals.format(r.measuredAt, 'dd.MM.yyyy HH:mm')}"></td>
                    <td th:text="${r.glucoseValue}"></td>
                    <td th:text="${r.measurementType == 'CGM' ? 'CGM' : 'Ручне'}"></td>
                    <td th:text="${r.notes ?: ''}"></td>
                    <td>
                        <form th:action="@{/glucose/{id}/delete(id=${r.id})}" method="post">
                            <button type="submit" class="btn btn-danger btn-sm"
                                    onclick="return confirm('Видалити цей показник?')">
                                Видалити
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="card-footer d-flex gap-2" th:unless="${readings.empty}">
            <a th:if="${currentPage > 0}"
               th:href="@{/glucose(page=${currentPage - 1})}"
               class="btn btn-outline-secondary btn-sm">← Назад</a>
            <a th:if="${!readings.last}"
               th:href="@{/glucose(page=${currentPage + 1})}"
               class="btn btn-outline-secondary btn-sm">Вперед →</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
