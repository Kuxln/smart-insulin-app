<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Smart Insulin — Профіль</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/dashboard}">Smart Insulin</a>
        <div class="navbar-nav ms-auto d-flex align-items-center gap-2">
            <a class="nav-link text-white" th:href="@{/glucose}">Глюкоза</a>
            <a class="nav-link text-white active" th:href="@{/profile}">Профіль</a>
            <form th:action="@{/logout}" method="post" class="mb-0">
                <button type="submit" class="btn btn-outline-light btn-sm">Вийти</button>
            </form>
        </div>
    </div>
</nav>

<div class="container">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" th:text="${success}">
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card shadow-sm">
        <div class="card-header">Профіль користувача</div>
        <div class="card-body">
            <p class="text-muted mb-4">
                <strong>Email:</strong>
                <span th:text="${profile.email}"></span>
            </p>

            <form th:action="@{/profile}" th:object="${form}" method="post">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Повне ім'я</label>
                        <input type="text" th:field="*{fullName}" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Тип діабету</label>
                        <select th:field="*{diabetesType}" class="form-select">
                            <option value="">— не вказано —</option>
                            <option value="1">Тип 1</option>
                            <option value="2">Тип 2</option>
                        </select>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Вага (кг)</label>
                        <input type="number" step="0.1" th:field="*{weightKg}" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Зріст (см)</label>
                        <input type="number" step="0.1" th:field="*{heightCm}" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Цільова глюкоза мін (ммоль/л)</label>
                        <input type="number" step="0.1" th:field="*{targetGlucoseMin}" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Цільова глюкоза макс (ммоль/л)</label>
                        <input type="number" step="0.1" th:field="*{targetGlucoseMax}" class="form-control">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Чутливість до інсуліну (ммоль/л / Од)</label>
                        <input type="number" step="0.01" th:field="*{insulinSensitivityFactor}" class="form-control">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Інсуліно-вуглеводне співвідношення (г/Од)</label>
                        <input type="number" step="0.01" th:field="*{insulinToCarbRatio}" class="form-control">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Тривалість дії інсуліну (год)</label>
                        <input type="number" step="0.1" th:field="*{durationOfInsulinAction}" class="form-control">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Базальний інсулін</label>
                        <input type="text" th:field="*{basalInsulinType}" class="form-control"
                               placeholder="напр. Lantus">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Болюсний інсулін</label>
                        <input type="text" th:field="*{bolusInsulinType}" class="form-control"
                               placeholder="напр. NovoRapid">
                    </div>
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-primary">Зберегти</button>
                    <a th:href="@{/dashboard}" class="btn btn-outline-secondary ms-2">Скасувати</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
