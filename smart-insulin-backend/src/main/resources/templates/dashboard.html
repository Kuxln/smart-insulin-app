<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Smart Insulin — Дашборд</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/dashboard}">Smart Insulin</a>
        <div class="navbar-nav ms-auto d-flex align-items-center gap-2">
            <a class="nav-link text-white" th:href="@{/glucose}">Глюкоза</a>
            <a class="nav-link text-white" th:href="@{/profile}">Профіль</a>
            <form th:action="@{/logout}" method="post" class="mb-0">
                <button type="submit" class="btn btn-outline-light btn-sm">Вийти</button>
            </form>
        </div>
    </div>
</nav>

<div class="container">
    <h5 class="mb-4">
        Вітаємо, <span th:text="${user.fullName}">Користувач</span>!
    </h5>

    <!-- HbA1c card -->
    <div class="row g-4 mb-4">
        <div class="col-md-4">
            <div class="card text-center shadow-sm">
                <div class="card-body py-4">
                    <h6 class="card-subtitle text-muted mb-2">HbA1c (останні 90 днів)</h6>
                    <p class="display-4 fw-bold mb-0"
                       th:text="${hba1c.readingsCount > 0} ? ${#numbers.formatDecimal(hba1c.hba1c, 1, 1)} + '%' : '—'">
                        —
                    </p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-center shadow-sm">
                <div class="card-body py-4">
                    <h6 class="card-subtitle text-muted mb-2">Середня глюкоза</h6>
                    <p class="display-4 fw-bold mb-0"
                       th:text="${hba1c.readingsCount > 0} ? ${#numbers.formatDecimal(hba1c.averageGlucose, 1, 1)} + ' ммоль/л' : '—'">
                        —
                    </p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-center shadow-sm">
                <div class="card-body py-4">
                    <h6 class="card-subtitle text-muted mb-2">Вимірювань за 90 днів</h6>
                    <p class="display-4 fw-bold mb-0" th:text="${hba1c.readingsCount}">0</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Recent readings -->
    <div class="card shadow-sm">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span>Останні показники глюкози</span>
            <a th:href="@{/glucose}" class="btn btn-sm btn-primary">Всі показники</a>
        </div>
        <div class="card-body p-0">
            <div th:if="${readings.empty}" class="p-3 text-muted">
                Показників ще немає. <a th:href="@{/glucose}">Додати перший</a>.
            </div>
            <table th:unless="${readings.empty}" class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th>Дата та час</th>
                    <th>Глюкоза (ммоль/л)</th>
                    <th>Тип вимірювання</th>
                    <th>Нотатки</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="r : ${readings}">
                    <td th:text="${#temporals.format(r.measuredAt, 'dd.MM.yyyy HH:mm')}"></td>
                    <td th:text="${r.glucoseValue}"></td>
                    <td th:text="${r.measurementType == 'CGM' ? 'CGM' : 'Ручне'}"></td>
                    <td th:text="${r.notes ?: ''}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
